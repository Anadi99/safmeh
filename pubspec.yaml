name: safmeh
description: "SafMeh — Personal Safety Companion App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Location & sensors
  geolocator: ^13.0.2
  sensors_plus: ^6.1.0

  # Background execution
  flutter_background_service: ^5.0.5

  # Firebase
  firebase_core: ^3.13.0
  cloud_firestore: ^5.6.6
  firebase_auth: ^5.5.2
  firebase_storage: ^12.4.4
  firebase_database: ^11.3.4
  firebase_messaging: ^15.2.4

  # Maps
  google_maps_flutter: ^2.10.0

  # Encryption & secure storage
  encrypt: ^5.0.3
  flutter_secure_storage: ^9.2.4

  # Biometric auth
  local_auth: ^2.3.0

  # Device info
  battery_plus: ^6.0.3

  # Audio
  record: ^5.2.0
  audioplayers: ^6.4.0

  # Permissions
  permission_handler: ^11.4.0

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  connectivity_plus: ^6.1.4
  path_provider: ^2.1.5
  shared_preferences: ^2.3.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Property-based testing
  glados: ^1.1.7

  # Mocking
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
